<ion-content>
  <div class="page-container auth-page">
    <img
      src="/assets/brand/logo4ases.png"
      alt="24 Ases"
      class="brand-logo"
    />

    <div class="app-card auth-card">
      <h1 class="app-title">Bienvenido</h1>
      <p class="app-subtitle">
        Ingresa con el usuario administrador registrado en este dispositivo.
      </p>

      <div class="form-field">
        <label class="form-label">Usuario</label>
        <ion-item>
          <ion-input
            [(ngModel)]="username"
            placeholder="Usuario"
            autocapitalize="off"
          ></ion-input>
        </ion-item>
      </div>

      <div class="form-field">
        <label class="form-label">Contraseña o PIN</label>
        <ion-item>
          <ion-input
            [(ngModel)]="password"
            type="password"
            placeholder="Contraseña"
          ></ion-input>
        </ion-item>
      </div>

      @if (errorMessage) {
        <ion-text color="danger">
          <p class="error-message">{{ errorMessage }}</p>
        </ion-text>
      }

      <ion-button
        expand="block"
        class="primary-button ion-margin-top"
        (click)="login()"
      >
        Iniciar sesión
      </ion-button>

      <ion-button
        expand="block"
        fill="clear"
        class="reset-button"
        (click)="resetApp()"
      >
        Reiniciar configuración
      </ion-button>
    </div>
  </div>
</ion-content>
